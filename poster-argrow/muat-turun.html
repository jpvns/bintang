<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Muat Turun Poster Argrow</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: linear-gradient(160deg, #0d2b5e, #1a1a2e);
      min-height: 100vh;
      padding: 24px 16px;
      color: #fff;
      text-align: center;
    }
    h1 { font-size: 22px; margin-bottom: 8px; color: #f0d078; }
    p { font-size: 15px; line-height: 1.6; color: #ccc; margin-bottom: 24px; max-width: 400px; margin-left: auto; margin-right: auto; }
    a.dl {
      display: block;
      max-width: 360px;
      margin: 0 auto 16px;
      padding: 22px 20px;
      background: linear-gradient(135deg, #d4a82a, #b8860b);
      color: #1a1a1a;
      font-size: 20px;
      font-weight: 800;
      text-decoration: none;
      border-radius: 14px;
      box-shadow: 0 6px 24px rgba(0,0,0,.35);
    }
    a.dl:active { transform: scale(0.98); }
    a.sec {
      display: block;
      max-width: 360px;
      margin: 0 auto;
      padding: 16px;
      color: #f0d078;
      font-size: 15px;
      text-decoration: underline;
    }
    .preview {
      max-width: 100%;
      width: 320px;
      margin: 24px auto;
      border-radius: 8px;
      border: 3px solid #d4a82a;
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
    }
  </style>
</head>
<body>
  <h1>Poster Argrow A1</h1>
  <p>MAKANAN KITA, TANGGUNGJAWAB KITA<br>Tekan butang kuning di bawah untuk muat turun PDF.</p>

  <a class="dl" href="Poster-Argrow-A1.pdf" download="Poster-Argrow-A1.pdf">
    ⬇️ MUAT TURUN PDF (A1)
  </a>

  <a class="sec" href="Poster-Argrow-A1-preview.png" download="Poster-Argrow-preview.png">
    Muat turun gambar pratonton (PNG)
  </a>

  <img class="preview" src="Poster-Argrow-A1-preview.png" alt="Pratonton poster Argrow">

  <p style="margin-top:20px;font-size:13px;">
    Selepas muat turun, hantar PDF ke kedai cetak — saiz <strong>A1 Portrait</strong>.
  </p>
</body>
</html>
